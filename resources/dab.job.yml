resources:
  jobs:
    dab_job:
      name: dab_job

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${resources.schemas.dab_schema.name}

      trigger:
        pause_status: ${presets.trigger_pause_status}
        file_arrival:
          url: ${var.volume_path}/

      email_notifications:
        on_failure:
          - paula.bariffo@lovelytics.com

      tasks:
        - task_key: create_table
          notebook_task:
            notebook_path: src/create_table
            source: GIT
        
        - task_key: etl_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.etl_pipeline.id}
          depends_on:
            - task_key: create_table
      
      git_source:
        git_url: https://github.com/paulabariffo-ll/dab-test.git
        git_provider: gitHub
        git_branch: main
